<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentFlowboard Web GUI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AgentFlowboard Web GUI</h1>
    </header>
    <main>
        <section id="status-section">
            <h2>Status & Commands</h2>
            <button id="testCommandBtn">Simulate Command / Get Status</button>
            <pre id="statusResult">Awaiting command...</pre>
        </section>

        <section id="projects-section">
            <h2>Projects</h2>
            <p>Current Project: <span id="currentProjectName">Loading...</span></p>
            <ul id="projectList">
                <!-- Projects will be loaded here by JavaScript -->
            </ul>
        </section>

        <section id="tasks-section">
            <h2>Tasks for <span id="tasksProjectName">Selected Project</span></h2>
            <ul id="taskList">
                <!-- Tasks will be loaded here by JavaScript -->
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
