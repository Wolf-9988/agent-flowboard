
version: '3.8'

services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "18790:18790"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    restart: always
    environment:
      - WEB_GUI_ACCESS_TOKEN=${WEB_GUI_ACCESS_TOKEN}
  web-gui:
    build:
      context: ./web-gui
      dockerfile: Dockerfile
    ports:
      - "3004:3000"
    volumes:
      - ./web-gui:/app
      - /app/node_modules
    restart: always
    environment:
      - PORT=3004
      - DASHBOARD_ACCESS_TOKEN=${WEB_GUI_ACCESS_TOKEN}
      
