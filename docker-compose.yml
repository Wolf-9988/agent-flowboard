
version: '3.8'

volumes:
  agentflowboard_db_data: # Define a named volume for database persistence




services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "18790:18790"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    restart: always
    environment:
      - WEB_GUI_ACCESS_TOKEN=${WEB_GUI_ACCESS_TOKEN}
  web-gui:
   
    build:
      context: ./web-gui
      dockerfile: Dockerfile
    ports:
      - "3004:3000"
    volumes:
      - ./web-gui:/app
      - /app/node_modules
      - /home/node/.openclaw/workspace/projects:/workspace/projects # Mount host projects dir to container
      - agentflowboard_db_data:/data # Mount named volume for SQLite persistence
    restart: always
    environment:
      - PORT=3000
      - DASHBOARD_ACCESS_TOKEN=${WEB_GUI_ACCESS_TOKEN}
      
